name: Keep Alive

on:
  schedule:
    # Primer día de cada mes a las 10 AM UTC (5 AM Colombia)
    - cron: "0 10 1 * *"

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Commit para mantener el workflow activo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date -u)" > .github/keep_alive.txt
          git add .github/keep_alive.txt
          git commit -m "chore: keep alive $(date -u '+%Y-%m')"
          git push
